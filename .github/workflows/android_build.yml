name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Fix Corrupt Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        DIST_URL=$(grep 'distributionUrl' gradle/wrapper/gradle-wrapper.properties | cut -d= -f2 | tr -d '\r')
        GRADLE_VERSION=$(echo "$DIST_URL" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')
        echo "Detected Gradle Version: $GRADLE_VERSION"
        curl -Lo gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v$GRADLE_VERSION/gradle/wrapper/gradle-wrapper.jar"

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Make Gradlew Executable
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace -x test -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-vault-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
